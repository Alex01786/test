    <script>
        const video = document.getElementById("video");

        let hls = null;

const playbackHeaders = {
    "Referer": "https://player.akamai.net.in/",
    "user-agent" : "ExoPlayer-Android"
};

function loadVideo(url) {
    hls?.destroy();
    hls = null;

    if (Hls.isSupported()) {
        hls = new Hls({
            xhrSetup(xhr) {
                Object.entries(playbackHeaders).forEach(
                    ([name, value]) => {
                        xhr.setRequestHeader(name, value);
                    }
                );

                // Required only for cookies/session authentication.
                xhr.withCredentials = true;
            }
        });

        hls.on(Hls.Events.ERROR, (_, data) => {
            console.error("HLS error:", {
                type: data.type,
                details: data.details,
                fatal: data.fatal,
                responseCode: data.response?.code
            });
        });

        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => {
                console.log("Press Play to begin");
            });
        });

        return;
    }

    if (video.canPlayType("application/vnd.apple.mpegurl")) {
        /*
         * Native Safari HLS cannot attach arbitrary JavaScript headers
         * to <video src>. Use cookies or a backend/proxy for that case.
         */
        video.src = url;
        return;
    }

    console.error("HLS is unsupported");
}

        selector.addEventListener("change", () => {
            loadVideo(selector.value);
        });
